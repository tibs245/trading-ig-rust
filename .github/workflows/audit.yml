name: Security audit (weekly)

# Runs cargo-audit + cargo-deny on a schedule and whenever the dependency
# graph changes. The CI workflow already runs cargo-audit on every push;
# this one adds cargo-deny (licenses, banned crates, source policy) and
# catches new advisories that were published after the code was last
# touched.

on:
  schedule:
    # Mondays at 06:00 UTC
    - cron: "0 6 * * 1"
  push:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit
      - run: cargo audit --deny warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny --all-features check advisories bans licenses sources
