# Configuration for `cargo deny` — used by the weekly Security audit
# workflow. Tweak rules conservatively: this gate runs on every Cargo.lock
# change and false positives are friction.

[graph]
# Only check the targets we actually support.
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
    { triple = "x86_64-pc-windows-msvc" },
]

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
# License families we accept upstream.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CDLA-Permissive-2.0",
    "OpenSSL",
]
confidence-threshold = 0.9
exceptions = []

[bans]
multiple-versions = "warn"   # only warn — transitive duplicates are common
wildcards = "warn"
highlight = "all"
allow = []
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
